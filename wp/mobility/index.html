<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #111111; --ink-muted: #444444; --ink-light: #888888;

    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;

  body { background: #fff; color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.97); border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .nav-name { font-family: var(--serif); font-size: 1.15rem; font-weight: 500; color: var(--ink); text-decoration: none; }
  .nav-name:hover { color: var(--accent); }
  .back-link { font-size: 13px; color: var(--ink-light); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
  .back-link:hover { color: var(--accent); }
  main { max-width: 800px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
  .paper-status { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 1px; background: #f2f2f2; color: #2a6e2a; border: 1px solid #c0d8c0; display: inline-block; margin-bottom: 1.25rem; }
  h1 { font-family: var(--serif); font-size: 2.2rem; font-weight: 500; line-height: 1.2; margin-bottom: 1rem; }
  .authors { font-size: 14px; color: var(--ink-muted); margin-bottom: 0.4rem; }
  .date { font-size: 13px; color: var(--ink-light); margin-bottom: 2rem; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
  .body-text { font-size: 15px; line-height: 1.8; color: var(--ink-light); font-style: italic; }
</style>
</head>

<nav>
